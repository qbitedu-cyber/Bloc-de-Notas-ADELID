<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Student Notes 2.0 | ADELID</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --cyber-bg: #020617; /* Slate 950 */
            --neon-yellow: #facc15;
            --neon-cyan: #06b6d4;
            --neon-red: #ef4444;
            --glass-bg: rgba(15, 23, 42, 0.85);
        }

        body {
            background-color: var(--cyber-bg);
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(250, 204, 21, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(6, 182, 212, 0.05) 0%, transparent 40%),
                repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.02) 10px, rgba(255,255,255,0.02) 20px);
            background-attachment: fixed;
            -webkit-tap-highlight-color: transparent;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }
        .space-font { font-family: 'Orbitron', sans-serif; }

        /* ADELID Watermark */
        .watermark {
            position: fixed; bottom: 20px; right: 20px; z-index: 0;
            font-size: 3rem; font-weight: 900; color: rgba(255,255,255,0.03);
            pointer-events: none; letter-spacing: 5px; font-family: 'Orbitron', sans-serif;
        }

        /* Fullscreen Button */
        #fs-btn {
            position: fixed; top: 15px; right: 15px; z-index: 100;
            background: rgba(30, 41, 59, 0.8); border: 1px solid var(--neon-yellow); color: var(--neon-yellow);
            width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s; backdrop-filter: blur(5px);
            box-shadow: 0 0 10px rgba(250, 204, 21, 0.2);
        }
        #fs-btn:hover { background: var(--neon-yellow); color: #000; box-shadow: 0 0 20px rgba(250, 204, 21, 0.6); }
        #fs-btn:active { transform: scale(0.9); }

        /* Main Container */
        .glass-panel {
            background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(250, 204, 21, 0.3); border-radius: 1rem; 
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(250, 204, 21, 0.05);
            display: flex; flex-direction: column; flex-grow: 1; overflow: hidden;
            position: relative; z-index: 10;
        }

        /* Top Info Bar */
        .top-info-bar {
            background: rgba(2, 6, 23, 0.8); border-bottom: 2px solid var(--neon-yellow);
            padding: 15px 25px; display: flex; flex-wrap: wrap; gap: 15px; justify-content: space-between; align-items: flex-end;
        }

        .header-input {
            background: transparent; border: none; border-bottom: 1px dashed #475569;
            color: var(--neon-cyan); font-family: 'JetBrains Mono', monospace; font-weight: bold;
            font-size: 0.9rem; padding: 2px 5px; outline: none; transition: all 0.3s;
        }
        .header-input:focus { border-bottom: 1px solid var(--neon-yellow); color: var(--neon-yellow); }
        .header-input::placeholder { color: #475569; font-weight: normal; }

        /* Text Area */
        textarea {
            width: 100%; flex-grow: 1; background: transparent; border: none; outline: none;
            color: #e2e8f0; font-family: 'JetBrains Mono', monospace; font-size: 1.1rem;
            line-height: 1.8; padding: 25px; resize: none;
            min-height: 60vh; /* Ajuste: Garantiza espacio visual para ~20-25 líneas */
        }
        
        textarea::-webkit-scrollbar { width: 8px; }
        textarea::-webkit-scrollbar-track { background: #0f172a; }
        textarea::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        textarea::-webkit-scrollbar-thumb:hover { background: var(--neon-yellow); }

        /* Footer */
        .status-footer {
            background: #000; border-top: 1px solid #334155; padding: 10px 25px;
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;
        }

        .touch-btn {
            background: #1e293b; border: 1px solid #334155; color: #fff; padding: 8px 15px;
            border-radius: 6px; font-weight: bold; cursor: pointer; transition: all 0.2s;
            text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; display: flex; align-items: center; gap: 6px;
        }
        .touch-btn:hover { border-color: var(--neon-cyan); color: var(--neon-cyan); background: rgba(6, 182, 212, 0.1); }
        .touch-btn.print-btn { background: var(--neon-yellow); color: #000; border-color: var(--neon-yellow); }
        .touch-btn.print-btn:hover { background: #eab308; box-shadow: 0 0 15px rgba(250, 204, 21, 0.4); color: #000; }
        .touch-btn:active { transform: scale(0.95); }

        /* Save Indicator */
        .save-indicator {
            display: flex; align-items: center; gap: 6px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; color: var(--neon-green);
        }
        .save-indicator .dot { width: 8px; height: 8px; background: var(--neon-green); border-radius: 50%; box-shadow: 0 0 8px var(--neon-green); animation: pulse 2s infinite; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Modal Animations */
        #custom-modal { transition: opacity 0.2s; }
        .modal-content { animation: slideDown 0.3s ease-out; }
        @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Print Styles */
        .print-only { display: none; }
        @media print {
            @page { margin: 2cm; }
            body { background: white !important; color: black !important; display: block; overflow: visible; padding: 0 !important; background-image: none !important;}
            #fs-btn, .watermark, .status-footer { display: none !important; }
            .glass-panel { background: white !important; border: none !important; box-shadow: none !important; padding: 0 !important; display: block; }
            
            /* Print Header Layout */
            .top-info-bar { background: transparent !important; border-bottom: 2px solid black !important; padding: 0 0 10px 0 !important; margin-bottom: 20px; display: flex !important; justify-content: space-between !important; align-items: flex-end !important;}
            .top-info-bar h1 { color: black !important; text-shadow: none !important; margin-bottom: 10px; }
            
            /* Inputs transform to text on print */
            .header-input { border: none !important; border-bottom: 1px solid #ccc !important; color: black !important; padding: 0 !important; font-size: 12pt !important; }
            
            textarea { color: black !important; font-family: 'Courier New', Courier, monospace !important; font-size: 12pt !important; padding: 0 !important; height: auto !important; overflow: visible !important; white-space: pre-wrap !important;}
            
            .print-only { display: block !important; }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="watermark">ADELID</div>

    <div id="fs-btn" onclick="toggleFullscreen()" class="no-print">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
    </div>

    <main class="w-full max-w-5xl mx-auto flex flex-col flex-grow h-full" style="animation: fadeIn 0.5s ease-out;">
        
        <div class="glass-panel">
            
            <!-- Information Bar (Replaces Login Screen) -->
            <div class="top-info-bar no-print-bg">
                <div>
                    <h1 class="text-xl md:text-2xl font-black text-yellow-400 uppercase tracking-widest space-font">ADELID Academic Log</h1>
                    <p class="text-xs text-slate-400 mono mt-1 print-only">Generated on: <span id="print-date"></span></p>
                </div>
                
                <div class="flex gap-4 flex-wrap">
                    <div class="flex flex-col">
                        <label class="text-[9px] text-slate-500 uppercase tracking-widest font-bold">Operative Name</label>
                        <input type="text" id="inp-name" class="header-input w-40 md:w-48" placeholder="Enter Name">
                    </div>
                    <div class="flex flex-col">
                        <label class="text-[9px] text-slate-500 uppercase tracking-widest font-bold">Grade / Lvl</label>
                        <input type="text" id="inp-grade" class="header-input w-20" placeholder="e.g. Lvl 1">
                    </div>
                    <div class="flex flex-col">
                        <label class="text-[9px] text-slate-500 uppercase tracking-widest font-bold">Sector / Group</label>
                        <input type="text" id="inp-group" class="header-input w-20" placeholder="e.g. A">
                    </div>
                </div>
            </div>

            <!-- Editor Area -->
            <textarea id="notepad" placeholder=">> Initialize input stream... Type your notes here."></textarea>

            <!-- Status Footer -->
            <div class="status-footer no-print">
                <div class="flex items-center gap-4">
                    <div class="save-indicator" id="save-status">
                        <div class="dot"></div> SYNCED TO CACHE
                    </div>
                    <span class="text-xs text-slate-500 mono border-l border-slate-700 pl-4" id="char-count">0 Chars</span>
                </div>
                
                <div class="flex gap-2">
                    <button onclick="clearData()" class="touch-btn border-red-900 text-red-500 hover:bg-red-900/30 hover:border-red-500">
                        🗑️ Purge
                    </button>
                    <button onclick="copyText()" class="touch-btn" id="btn-copy">
                        📋 Copy
                    </button>
                    <button onclick="printNotes()" class="touch-btn print-btn">
                        🖨️ Print Log
                    </button>
                </div>
            </div>

        </div>

    </main>

    <!-- Custom Purge Modal -->
    <div id="custom-modal" class="fixed inset-0 bg-black/80 z-[200] hidden items-center justify-center backdrop-blur-sm px-4" style="opacity: 0;">
        <div class="modal-content glass-panel border-red-500/50 p-8 max-w-sm w-full text-center">
            <span class="text-5xl block mb-2">⚠️</span>
            <h2 class="text-xl font-bold text-red-400 mb-4 space-font uppercase tracking-widest">System Purge</h2>
            <p class="text-slate-300 mb-8 text-sm mono">Are you sure you want to permanently clear all data from the cache?</p>
            <div class="flex gap-4 justify-center">
                <button onclick="closeModal()" class="touch-btn bg-slate-800 text-white border border-slate-600 hover:bg-slate-700 w-1/2 justify-center">Cancel</button>
                <button onclick="executePurge()" class="touch-btn border-red-900 text-red-500 hover:bg-red-900/30 hover:border-red-500 w-1/2 justify-center">Purge</button>
            </div>
        </div>
    </div>

    <script>
        // --- AUDIO ENGINE ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        const sfx = {
            tap: () => playTone(600, 'square', 0.05, 0.02),
            success: () => { playTone(800, 'sine', 0.1); setTimeout(() => playTone(1200, 'sine', 0.1), 100); },
            trash: () => { playTone(200, 'sawtooth', 0.1); setTimeout(() => playTone(150, 'sawtooth', 0.2), 100); },
            type: () => playTone(Math.random() * 200 + 400, 'square', 0.01, 0.005) // Muy sutil para escribir
        };

        function playTone(freq, type, duration, vol=0.1) {
            initAudio();
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.stop(audioCtx.currentTime + duration);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
            else if (document.exitFullscreen) document.exitFullscreen();
        }

        // --- DOM Elements ---
        const inpName = document.getElementById('inp-name');
        const inpGrade = document.getElementById('inp-grade');
        const inpGroup = document.getElementById('inp-group');
        const notepad = document.getElementById('notepad');
        const charCount = document.getElementById('char-count');
        const saveStatus = document.getElementById('save-status');

        // --- CORE LOGIC: CACHE & AUTO-SAVE ---
        
        // 1. Load Data on Initialization
        document.addEventListener('DOMContentLoaded', () => {
            // Nota: NO usamos notepad.focus() aquí para evitar el scroll automático en Wix.
            
            document.getElementById('print-date').innerText = new Date().toLocaleDateString();

            if(localStorage.getItem('adelid_notes_name')) inpName.value = localStorage.getItem('adelid_notes_name');
            if(localStorage.getItem('adelid_notes_grade')) inpGrade.value = localStorage.getItem('adelid_notes_grade');
            if(localStorage.getItem('adelid_notes_group')) inpGroup.value = localStorage.getItem('adelid_notes_group');
            if(localStorage.getItem('adelid_notes_content')) {
                notepad.value = localStorage.getItem('adelid_notes_content');
                updateCharCount();
            }
        });

        // 2. Save Functions
        function saveCache() {
            localStorage.setItem('adelid_notes_name', inpName.value);
            localStorage.setItem('adelid_notes_grade', inpGrade.value);
            localStorage.setItem('adelid_notes_group', inpGroup.value);
            localStorage.setItem('adelid_notes_content', notepad.value);
            
            // Visual Feedback
            saveStatus.innerHTML = '<div class="dot"></div> SYNCED TO CACHE';
            saveStatus.style.color = "var(--neon-green)";
            saveStatus.querySelector('.dot').style.background = "var(--neon-green)";
            saveStatus.querySelector('.dot').style.boxShadow = "0 0 8px var(--neon-green)";
        }

        function indicateTyping() {
            saveStatus.innerHTML = 'SYNCING...';
            saveStatus.style.color = "var(--neon-cyan)";
        }

        // Attach Save Events
        [inpName, inpGrade, inpGroup].forEach(el => {
            el.addEventListener('input', () => {
                sfx.type();
                indicateTyping();
                clearTimeout(window.saveTimeout);
                window.saveTimeout = setTimeout(saveCache, 500); // 500ms debounce
            });
        });

        notepad.addEventListener('input', () => {
            // Light sound effect only for alphanumeric to avoid noise pollution
            updateCharCount();
            indicateTyping();
            clearTimeout(window.saveTimeout);
            window.saveTimeout = setTimeout(saveCache, 800); // Save 800ms after they stop typing
        });
        
        // Sutil sonido al teclear
        notepad.addEventListener('keydown', (e) => {
            if(e.key.length === 1) sfx.type(); 
        });

        function updateCharCount() {
            charCount.innerText = `${notepad.value.length} CHARS`;
        }

        // --- BUTTON ACTIONS ---
        function copyText() {
            sfx.success();
            notepad.select();
            document.execCommand('copy');
            
            const btn = document.getElementById('btn-copy');
            const originalText = btn.innerHTML;
            btn.innerHTML = '✓ Copied';
            btn.style.color = "var(--neon-green)";
            btn.style.borderColor = "var(--neon-green)";
            
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.style.color = "";
                btn.style.borderColor = "";
                // Deselect text so it doesn't stay highlighted
                window.getSelection().removeAllRanges();
            }, 2000);
        }

        function printNotes() {
            sfx.tap();
            // Allow CSS to render before print dialog blocks thread
            setTimeout(() => {
                window.print();
            }, 100);
        }

        // --- CUSTOM MODAL LOGIC ---
        const modal = document.getElementById('custom-modal');

        function clearData() {
            sfx.tap();
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => modal.style.opacity = '1', 10);
        }

        function closeModal() {
            sfx.tap();
            modal.style.opacity = '0';
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 200);
        }

        function executePurge() {
            closeModal();
            sfx.trash();
            localStorage.removeItem('adelid_notes_name');
            localStorage.removeItem('adelid_notes_grade');
            localStorage.removeItem('adelid_notes_group');
            localStorage.removeItem('adelid_notes_content');
            
            inpName.value = '';
            inpGrade.value = '';
            inpGroup.value = '';
            notepad.value = '';
            
            updateCharCount();
            saveStatus.innerHTML = 'CACHE PURGED';
            saveStatus.style.color = "var(--neon-red)";
            
            setTimeout(() => {
                saveStatus.innerHTML = '<div class="dot"></div> SYNCED TO CACHE';
                saveStatus.style.color = "var(--neon-green)";
            }, 2000);
        }
    </script>
</body>
</html>
