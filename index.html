<!doctype html>
<html lang="es" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADELID Student Log</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- SDKs originales -->
  <script src="/_sdk/element_sdk.js"></script>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>

  <style>
        /* FUENTE TÉCNICA */
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --adelid-bg: #0a0a0a;
            --adelid-gold: #FFD700;
            --adelid-gold-dim: #b39700;
            --adelid-gray: #1a1a1a;
        }

        body {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            box-sizing: border-box;
            background-color: var(--adelid-bg);
            color: #e0e0e0;
        }

        /* INPUTS PERSONALIZADOS */
        .adelid-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid #333;
            color: var(--adelid-gold);
            font-family: inherit;
            padding: 4px 0;
            outline: none;
            transition: border-color 0.3s;
            width: 100%;
        }
        .adelid-input:focus {
            border-bottom-color: var(--adelid-gold);
        }
        .adelid-input::placeholder {
            color: #555;
            font-size: 0.9em;
        }

        /* SCROLLBAR */
        textarea::-webkit-scrollbar { width: 8px; }
        textarea::-webkit-scrollbar-track { background: var(--adelid-gray); }
        textarea::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        textarea::-webkit-scrollbar-thumb:hover { background: var(--adelid-gold); }

        /* CLASES DE UTILIDAD */
        .text-adelid { color: var(--adelid-gold); }
        .bg-adelid { background-color: var(--adelid-gold); }
        
        .btn-action {
            transition: all 0.2s;
            border: 1px solid #333;
        }
        .btn-action:hover {
            border-color: var(--adelid-gold);
            color: var(--adelid-gold);
            background: rgba(255, 215, 0, 0.1);
        }

        /* --- ESTILOS DE IMPRESIÓN (PDF EVIDENCE) --- */
        @media print {
            @page {
                margin: 1.5cm;
                size: auto;
            }

            body {
                background-color: #fff !important;
                color: #000 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            /* Ocultar interfaz de edición */
            .no-print, .btn-action, .toolbar {
                display: none !important;
            }

            /* Mostrar encabezado de impresión */
            .print-header-container {
                display: flex !important;
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                border-bottom: 3px solid #000;
                padding-bottom: 15px;
                margin-bottom: 25px;
            }

            /* Datos del alumno en impresión */
            .student-info-grid {
                display: grid !important;
                grid-template-columns: 1fr 1fr;
                gap: 10px;
                margin-bottom: 20px;
                padding: 10px;
                background-color: #f5f5f5; /* Fondo gris muy claro para datos */
                border: 1px solid #ddd;
            }
            .info-item strong {
                display: block;
                font-size: 0.75rem;
                text-transform: uppercase;
                color: #666;
            }
            .info-item span {
                font-size: 1.1rem;
                font-weight: bold;
            }

            /* Área de texto principal */
            #notepad-container {
                border: none !important;
                background: transparent !important;
            }
            
            textarea {
                color: #000 !important;
                background: transparent !important;
                font-size: 11pt !important;
                line-height: 1.6;
                padding: 0 !important;
                height: auto !important;
                overflow: visible !important;
                resize: none;
                /* Truco para que el textarea crezca al imprimir si tiene mucho texto */
                display: block; 
                width: 100%;
            }
        }
        
        .print-header-container, .student-info-grid { 
            display: none; 
        }
  </style>
 </head>

 <body class="h-full flex flex-col overflow-hidden">
  
  <main class="h-full p-4 flex flex-col relative">
   
   <div class="max-w-5xl mx-auto w-full h-full flex flex-col">
    
    <!-- HEADER PANTALLA (NO IMPRIMIR) -->
    <div class="mb-2 flex justify-between items-center no-print">
     <div class="flex items-center gap-3">
        <!-- Logo Eliminado, solo texto -->
        <div>
            <h1 id="title" class="text-xl font-bold text-adelid tracking-wider uppercase">ADELID // ACADEMIC LOG</h1>
            <p class="text-gray-500 text-[10px] mt-0">SYSTEM READY</p>
        </div>
     </div>
     
     <div class="flex gap-2">
        <button onclick="copyText()" class="btn-action bg-gray-900 text-gray-300 px-3 py-2 rounded text-xs font-bold uppercase tracking-wide flex items-center gap-2">
            <span>📋</span> <span class="hidden sm:inline">Copy</span>
        </button>
        <button onclick="printNotes()" class="bg-adelid text-black px-4 py-2 rounded text-xs font-bold uppercase tracking-wide hover:bg-yellow-400 shadow-lg transition-transform active:scale-95 flex items-center gap-2">
            <span>🖨️</span> <span>Save PDF</span>
        </button>
     </div>
    </div>

    <!-- SECCIÓN DE DATOS DEL ALUMNO (INPUTS PANTALLA) -->
    <div class="bg-gray-900/50 p-4 rounded mb-2 border border-gray-800 no-print">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div>
                <label class="block text-xs text-gray-500 uppercase mb-1">Student Name</label>
                <input type="text" id="inputName" class="adelid-input" placeholder="Enter full name...">
            </div>
            <div>
                <label class="block text-xs text-gray-500 uppercase mb-1">Grade & Group</label>
                <input type="text" id="inputGrade" class="adelid-input" placeholder="e.g. 5th Grade - A">
            </div>
            <div>
                <label class="block text-xs text-gray-500 uppercase mb-1">Date</label>
                <input type="date" id="inputDate" class="adelid-input text-gray-400">
            </div>
        </div>
    </div>

    <!-- HEADER PARA IMPRESIÓN (OCULTO EN PANTALLA) -->
    <div class="print-header-container">
        <div class="flex items-center gap-4">
            <!-- Logo eliminado -->
            <div>
                <h1 class="text-3xl font-bold uppercase tracking-widest">ADELID</h1>
                <p class="text-sm uppercase tracking-wide text-gray-600">Academic Evidence Record</p>
            </div>
        </div>
        <div class="text-right">
            <div class="border-2 border-black px-3 py-1 font-bold text-xl">OFFICIAL RECORD</div>
        </div>
    </div>

    <!-- GRID DE DATOS PARA IMPRESIÓN -->
    <div class="student-info-grid">
        <div class="info-item">
            <strong>Student Name:</strong>
            <span id="printNameDisplay"></span>
        </div>
        <div class="info-item">
            <strong>Date:</strong>
            <span id="printDateDisplay"></span>
        </div>
        <div class="info-item" style="grid-column: span 2;">
            <strong>Grade / Group:</strong>
            <span id="printGradeDisplay"></span>
        </div>
    </div>

    <!-- ÁREA DE TEXTO PRINCIPAL -->
    <div id="notepad-container" class="flex-1 bg-gray-900 rounded border border-gray-700 focus-within:border-yellow-500/50 transition-colors relative overflow-hidden flex flex-col">
     
        <textarea id="notepad" 
        class="w-full flex-1 p-6 bg-transparent text-gray-200 text-lg leading-relaxed resize-none border-none outline-none focus:ring-0 font-mono" 
        placeholder="> Initialize input stream... Start typing your activity here." 
        spellcheck="false"></textarea>

        <div class="bg-black py-1 px-4 flex justify-between items-center border-t border-gray-800 no-print">
            <span class="text-[10px] text-gray-500 uppercase tracking-widest">ADELID System v2.0</span>
            <span class="text-[10px] text-adelid" id="charCount">0 CHARS</span>
        </div>

    </div>

   </div>
  </main>

  <script>
        // --- CONFIGURACIÓN ---
        const textarea = document.getElementById('notepad');
        const charCountDisplay = document.getElementById('charCount');
        
        // Inputs
        const inputName = document.getElementById('inputName');
        const inputGrade = document.getElementById('inputGrade');
        const inputDate = document.getElementById('inputDate');

        // Print Displays
        const printName = document.getElementById('printNameDisplay');
        const printGrade = document.getElementById('printGradeDisplay');
        const printDate = document.getElementById('printDateDisplay');

        // Inicialización
        document.addEventListener('DOMContentLoaded', function() {
            // Establecer fecha actual automáticamente
            const today = new Date().toISOString().split('T')[0];
            inputDate.value = today;
            
            textarea.focus();
        });

        // SDK Simulado (Para compatibilidad con tu sistema existente)
        const defaultConfig = {
            title_text: "ADELID // ACADEMIC LOG",
            placeholder_text: "> Initialize input stream..."
        };
        if (window.elementSdk) {
            window.elementSdk.init({
                defaultConfig: defaultConfig,
                onConfigChange: (config) => {
                    const titleElement = document.getElementById('title');
                    if (titleElement) titleElement.textContent = config.title_text || defaultConfig.title_text;
                }
            });
        }

        // Contador de Caracteres
        textarea.addEventListener('input', function() {
            charCountDisplay.textContent = this.value.length + " CHARS";
        });

        function copyText() {
            textarea.select();
            document.execCommand('copy');
            const originalText = charCountDisplay.textContent;
            charCountDisplay.textContent = "COPIED!";
            charCountDisplay.style.color = "#fff";
            setTimeout(() => {
                charCountDisplay.textContent = originalText;
                charCountDisplay.style.color = "#FFD700";
            }, 2000);
        }

        function printNotes() {
            // 1. Transferir datos de los inputs a la vista de impresión
            printName.textContent = inputName.value || "_________________";
            printGrade.textContent = inputGrade.value || "_________________";
            
            // Formatear fecha para que se vea bonita al imprimir
            if(inputDate.value) {
                const dateObj = new Date(inputDate.value);
                // Ajuste de zona horaria simple para evitar desfase de día
                const userTimezoneOffset = dateObj.getTimezoneOffset() * 60000;
                const correctedDate = new Date(dateObj.getTime() + userTimezoneOffset);
                printDate.textContent = correctedDate.toLocaleDateString('es-ES', { 
                    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' 
                });
            } else {
                printDate.textContent = "_________________";
            }

            // 2. Ajustar altura del textarea para que salga todo el texto en PDF
            const originalHeight = textarea.style.height;
            textarea.style.height = (textarea.scrollHeight + 50) + 'px';

            // 3. Imprimir
            window.print();

            // 4. Restaurar altura (aunque el usuario no lo note mucho)
            textarea.style.height = originalHeight;
        }
  </script>
 </body>
</html>
